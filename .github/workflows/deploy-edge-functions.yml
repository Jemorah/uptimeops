name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Edge Functions to Supabase
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: npcopjsqgjvirfjnjemt
        run: |
          echo "Linking to project $SUPABASE_PROJECT_ID..."
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

          echo ""
          echo "Deploying all Edge Functions..."
          supabase functions deploy

          echo ""
          echo "Deployed functions:"
          supabase functions list

      - name: Verify deployment
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "All Edge Functions deployed successfully!"
          echo "Project: npcopjsqgjvirfjnjemt"
